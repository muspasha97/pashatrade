name: Trade System - Haftalik Optimizer

on:
  schedule:
    # Her pazar 03:00 UTC - kirmizi set tespiti
    - cron: "0 3 * * 0"
  workflow_dispatch:  # Manuel tetikleme (test icin)

permissions:
  contents: write

jobs:
  run-optimizer:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run optimizer
        run: python -m src.optimizer

      - name: Commit and push rules
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add rules/ logs/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Yeni kural yok"
          else
            git commit -m "weekly: kirmizi set guncellendi $(date -u +%Y-%m-%d)"
            git pull --rebase origin main || true
            git push origin main
          fi
