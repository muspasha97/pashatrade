name: Trade System - 15dk Cycle

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: trade-cycle
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup src package
        run: |
          mkdir -p src data state rules logs
          for f in __init__.py collector.py config.py decision.py excel_io.py indicators.py main.py microstructure.py optimizer.py state.py trader.py utils.py; do
            [ -f "$f" ] && cp "$f" src/
          done

      - name: Run cycle
        run: python -m src.main

      - name: Commit and push
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add data/ state/ logs/ rules/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Degisiklik yok"
          else
            git commit -m "auto: cycle $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase origin main && git push origin main
          fi
